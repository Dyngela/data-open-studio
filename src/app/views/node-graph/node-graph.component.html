<div class="node-graph" (contextmenu)="onRightClick($event)">
  <svg class="connections" xmlns="http://www.w3.org/2000/svg">
    <line *ngFor="let conn of graph.connections"
          [attr.x1]="getNode(conn.fromNode).position.x + 75"
    [attr.y1]="getNode(conn.fromNode).position.y + 10"
    [attr.x2]="getNode(conn.toNode).position.x + 75"
    [attr.y2]="getNode(conn.toNode).position.y + 10"
    stroke="black" stroke-width="2" />
  </svg>
  <app-node *ngFor="let node of graph.nodes"
            [node]="node"
            (nodeMove)="onNodeMove($event)"
            (nodeRightClick)="onNodeRightClick($event)">
  </app-node>
  <app-context-menu [items]="contextMenuItems" [position]="contextMenuPosition"></app-context-menu>
</div>
